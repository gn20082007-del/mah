version: '3.9'

services:
  # ── MongoDB ─────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: mfn_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: mfn_news
    volumes:
      - mfn_mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - mfn_network

  # ── Backend ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mfn_backend
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/mfn_news
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production}
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - mongo
    networks:
      - mfn_network

  # ── Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mfn_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - mfn_network

volumes:
  mfn_mongo_data:

networks:
  mfn_network:
    driver: bridge
